services:
  postgres:
    image: postgres:16-alpine
    container_name: secret-news-postgres
    environment:
      POSTGRES_DB: secret_news
      POSTGRES_USER: secret_news
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - secret_news_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secret_news -d secret_news"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  secret_news_pg_data:
